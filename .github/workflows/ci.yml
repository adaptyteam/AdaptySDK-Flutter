name: CI

on:
  pull_request:
    branches: [dev, master]
  push:
    branches: [dev, master]

# Stage 1 runs on Linux only (no iOS toolchain), so it can exercise the plugin +
# example only on Flutter where SwiftPM "just works" — i.e. 3.44+, where SwiftPM is
# the default. Our declared floor (Flutter 3.32) can't be validated here: an
# SwiftPM-only plugin needs the consuming project migrated to SwiftPM, and that
# migration requires an iOS build (macOS). The 3.32 boundary therefore moves to
# stage 2 (a macOS job — separate spec).
jobs:
  analyze-test:
    name: analyze-test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: stable
            channel: stable   # latest stable (SwiftPM default-on)
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.channel }}
          cache: true

      - run: flutter --version

      - name: Resolve root package
        run: flutter pub get

      - name: Analyze root package
        run: flutter analyze
